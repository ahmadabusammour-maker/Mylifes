                    <div className="mb-4 mt-2 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Available Positions</div>
                    
                    {JOBS.filter(j => character.age >= j.minAge).length === 0 && (
                        <p className="text-center text-gray-500 mt-4 text-sm">You are too young to work! Focus on school.</p>
                    )}

                    {JOBS.filter(j => character.age >= j.minAge && (!j.maxAge || character.age <= j.maxAge)).map((j) => {
                      const qualified = (!j.reqDegree || education.degrees.some(d => {
                          if (Array.isArray(j.reqDegree)) {
                              return j.reqDegree.some(req => d.includes(req));
                          }
                          return d.includes(j.reqDegree);
                      })) && stats.smarts >= j.minSmarts;

                      return (
                        <button key={j.title} onClick={() => { if(qualified) { setJob(j); addLog(`You were hired as a ${j.title}!`, "good"); updateStat('happiness', 20); setActiveScreen('main'); } else { addLog(`Rejected. You lack the qualifications for ${j.title}.`, "bad"); setActiveScreen('main'); } }} className={`w-full p-4 rounded-2xl flex items-center mb-3 border ${qualified ? 'bg-gray-800 border-gray-700 hover:border-emerald-500' : 'bg-gray-900 border-gray-800 opacity-60'} transition-all text-left`}>
                          <div className="flex-1">
                            <div className="font-bold text-white text-lg">{j.title}</div>
                            <div className="text-emerald-400 font-medium text-sm my-0.5">${j.salary.toLocaleString()} / yr</div>
                            <div className="text-xs text-gray-500 mt-1">
                                {j.reqDegree ? `Requires: ${Array.isArray(j.reqDegree) ? j.reqDegree.join(' or ') : j.reqDegree}` : 'No Degree Required'} • Smarts: {j.minSmarts}+
                            </div>
                          </div>
                          <ChevronRight className="text-gray-600" />
                        </button>
                      )
                    })}
                  </ScreenLayout>
                )}

                {activeScreen === 'education' && (
                  <ScreenLayout title="Education">
                    <div className="bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-4">
                       <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">Your Credentials</h3>
                       {education.degrees.length === 0 ? <p className="text-gray-400 italic">None</p> : education.degrees.map(d => <div key={d} className="text-white font-medium flex items-center gap-2 mb-1"><GraduationCap size={16} className="text-blue-400 shrink-0"/> <span className="truncate">{d}</span></div>)}
                    </div>

                    {education.current && (
                      <div className="mb-4">
                        <MenuCard icon={<BookOpen/>} title={`Enrolled:`} desc={education.current} onClick={() => {}} bg="bg-blue-900/40" color="text-blue-400"/>
                        <div className="flex gap-2 mt-2">
                          <button onClick={graduate} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all">Graduate</button>
                          <button onClick={dropOut} className="flex-1 bg-red-900/50 text-red-400 hover:bg-red-900 hover:text-white font-bold py-3 rounded-xl transition-all">Drop Out</button>
                        </div>
                      </div>
                    )}

                    {!education.current && character.age >= 18 && enrollmentProcess && (
                      <div className="bg-gray-900 border border-emerald-800/50 rounded-2xl p-5 mb-4 shadow-lg animate-in slide-in-from-bottom-2">
                         <h3 className="text-lg font-bold text-white mb-1">Enroll in {enrollmentProcess.school}</h3>
                         <p className="text-sm text-emerald-400 mb-5 font-medium">Tuition: ${enrollmentProcess.cost.toLocaleString()}</p>
                         
                         <label className="block text-xs font-bold uppercase text-gray-400 mb-2">Select Your Major</label>
                         <select value={selectedMajor} onChange={(e) => setSelectedMajor(e.target.value)} className="w-full bg-gray-950 border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 mb-5 appearance-none">
                            {MAJORS.map(m => <option key={m} value={m}>{m}</option>)}
                         </select>
                         
                         <div className="flex gap-2">
                            <button onClick={() => applyEducation(enrollmentProcess.school, enrollmentProcess.cost, selectedMajor)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all">Pay & Enroll</button>
                            <button onClick={() => setEnrollmentProcess(null)} className="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-xl transition-all border border-gray-700">Cancel</button>
                         </div>
                      </div>
                    )}

                    {!education.current && character.age >= 18 && !enrollmentProcess && (
                      <>
                        <div className="mb-2 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Undergraduate Programs</div>
                        <MenuCard icon={<GraduationCap />} title="Community College" desc="2-Year Degree ($10,000)" onClick={() => startEnrollment("Community College", 10000, true)} />
                        <MenuCard icon={<GraduationCap />} title="University" desc="4-Year Bachelors ($40,000)" onClick={() => startEnrollment("University", 40000, true)} />
                        
                        {education.degrees.some(d => d.includes("University")) && (
                          <>
                            <div className="mb-2 mt-6 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Graduate & Professional Schools</div>
                            <MenuCard icon={<BookOpen />} title="Graduate School" desc="Master's Degree ($30,000)" onClick={() => startEnrollment("Graduate School", 30000, true)} />
                            <MenuCard icon={<Stethoscope />} title="Nursing School" desc="Advanced Nursing ($50,000)" onClick={() => startEnrollment("Nursing School", 50000, false)} />
                            <MenuCard icon={<Briefcase />} title="Law School" desc="Juris Doctor ($120,000)" onClick={() => startEnrollment("Law School", 120000, false)} />
                            <MenuCard icon={<Activity />} title="Business School" desc="MBA ($90,000)" onClick={() => startEnrollment("Business School", 90000, false)} />
                            <MenuCard icon={<Stethoscope />} title="Medical School" desc="MD ($150,000)" onClick={() => startEnrollment("Medical School", 150000, false)} />
                          </>
                        )}

                        {education.degrees.some(d => d.includes("Graduate School")) && (
                          <>
                            <div className="mb-2 mt-6 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Doctoral Programs</div>
                            <MenuCard icon={<GraduationCap />} title="Doctorate (PhD)" desc="PhD Program ($80,000)" onClick={() => startEnrollment("Doctorate (PhD)", 80000, true)} />
                          </>
                        )}
                      </>
                    )}
                    {character.age < 18 && !education.current && <p className="text-center text-gray-500">Focus on primary school first.</p>}
                  </ScreenLayout>
                )}

                {activeScreen === 'relationships' && (
                   <ScreenLayout title="Relationships">
                     {relationships.length === 0 && <p className="text-center text-gray-500 mt-10">You have no close relationships right now.</p>}
                     {relationships.map(person => (
                        <div key={person.id} className="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden mb-4">
                           <div className="p-4 border-b border-gray-700 bg-gray-800/50 flex justify-between items-center">
                              <div>
                                <div className="font-bold text-lg text-white">{person.name}</div>
                                <div className="text-sm text-gray-400 capitalize">
                                    {person.type} • {person.gender} • {person.type === 'Pet' ? `Age ${person.age} (Pet)` : `Age ${person.age}`}
                                </div>
                              </div>
                              <div className="w-24">
                                 <div className="text-[10px] text-gray-500 font-bold uppercase mb-1 text-right">Bond</div>
                                 <div className="h-2 bg-gray-900 rounded-full overflow-hidden"><div className="h-full bg-pink-500 transition-all" style={{width: `${person.relationshipLevel}%`}}></div></div>
                              </div>
                           </div>

                           {person.type === 'Pet' ? (
                               <div className="grid grid-cols-2 divide-x divide-gray-700/50 bg-gray-900 border-t border-gray-700">
                                   <button onClick={() => interact(person, 'spend_time')} className="p-3 flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors text-blue-400 font-bold text-sm"><MessageCircle size={16}/> Play</button>
                                   <button onClick={() => interact(person, 'treat')} className="p-3 flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors text-emerald-400 font-bold text-sm"><Heart size={16}/> Give Treat</button>
                               </div>
                           ) : (
                               <>
                                   <div className="grid grid-cols-4 divide-x divide-gray-700/50 bg-gray-900">
                                      <button onClick={() => interact(person, 'spend_time')} className="p-3 flex flex-col items-center justify-center gap-1 hover:bg-gray-800 transition-colors text-gray-400 hover:text-white"><MessageCircle size={18}/> <span className="text-[10px] font-bold">Time</span></button>
                                      <button onClick={() => interact(person, 'converse')} className="p-3 flex flex-col items-center justify-center gap-1 hover:bg-gray-800 transition-colors text-gray-400 hover:text-white"><MessageCircle size={18}/> <span className="text-[10px] font-bold">Chat</span></button>
                                      <button onClick={() => interact(person, 'compliment')} className="p-3 flex flex-col items-center justify-center gap-1 hover:bg-gray-800 transition-colors text-emerald-400 hover:text-emerald-300"><ThumbsUp size={18}/> <span className="text-[10px] font-bold">Praise</span></button>
                                      <button onClick={() => interact(person, 'insult')} className="p-3 flex flex-col items-center justify-center gap-1 hover:bg-gray-800 transition-colors text-red-400 hover:text-red-300"><ThumbsDown size={18}/> <span className="text-[10px] font-bold">Insult</span></button>
                                   </div>
                                   {['Partner', 'Fiancé(e)', 'Spouse'].includes(person.type) && character.age >= 18 && (
                                      <div className="grid grid-cols-2 divide-x divide-gray-700/50 border-t border-gray-700 bg-gray-900">
                                         {person.type === 'Partner' && <button onClick={() => interact(person, 'propose')} className="p-3 flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors text-pink-400 font-bold text-sm">Propose</button>}
                                         {person.type === 'Fiancé(e)' && <button onClick={() => interact(person, 'marry')} className="p-3 flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors text-pink-400 font-bold text-sm">Marry ($5k)</button>}
                                         {['Fiancé(e)', 'Spouse'].includes(person.type) && <button onClick={() => interact(person, 'have_baby')} className="p-3 flex items-center justify-center gap-2 hover:bg-gray-800 transition-colors text-blue-400 font-bold text-sm"><Baby size={16}/> Have Baby</button>}
                                      </div>
                                   )}
                                   
                                   {/* Added Break Up / Divorce Button */}
                                   {['Partner', 'Fiancé(e)', 'Spouse'].includes(person.type) && (
                                      <div className="grid grid-cols-1 divide-x divide-gray-700/50 border-t border-gray-700 bg-gray-900">
                                         <button onClick={() => interact(person, 'break_up')} className="p-3 flex items-center justify-center gap-2 hover:bg-red-950/30 transition-colors text-red-400 font-bold text-sm">
                                            {person.type === 'Spouse' ? 'Get a Divorce' : 'Break Up'}
                                         </button>
                                      </div>
                                   )}
                               </>
                           )}
                        </div>
                     ))}
                   </ScreenLayout>
                )}

                {activeScreen === 'assets' && (
                   <ScreenLayout title="Assets & Wealth">
                      {character.age < 18 ? <p className="text-center text-gray-500 mt-10">You must be 18 to purchase assets.</p> : (
                         <>
                           <div className="bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-5 shadow-inner">
                              <h3 className="text-sm font-bold text-gray-500 uppercase tracking-wider mb-2">Your Portfolio</h3>
                              {!character.hasDriversLicense && <p className="text-orange-400 text-xs mb-2 italic">You need a driver's license to buy cars.</p>}
                              {assets.length === 0 ? <p className="text-gray-400 italic">No assets owned.</p> : assets.map((a) => (
                                 <div key={a.id} className="flex justify-between items-center py-2 border-b border-gray-800 last:border-0 text-white font-medium">
                                    <span className="flex items-center gap-2">{a.type === 'Car' ? <Car size={16} className="text-gray-400"/> : <Home size={16} className="text-gray-400"/>} {a.name}</span>
                                    <span className="text-emerald-400">${a.value.toLocaleString()}</span>
                                 </div>
                              ))}
                           </div>

                           <div className="mb-2 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Car Dealership</div>
                           {CAR_DEALER.map((car) => (
                              <MenuCard key={car.name} icon={<Car/>} title={car.name} desc={`Condition: ${car.condition} • $${car.value.toLocaleString()}`} 
                                 onClick={() => { 
                                     if(!character.hasDriversLicense) { addLog("You need a driver's license to buy a car!", "bad"); return; }
                                     if(character.bankBalance >= car.value) { updateBank(-car.value); setAssets(prev => [...prev, {id: generateId(), type: 'Car', ...car}]); addLog(`Bought a ${car.name}!`, "good"); updateStat('happiness', 15); setActiveScreen('main'); } else addLog("Not enough money.", "bad"); 
                                 }} />
                           ))}

                           <div className="mt-6 mb-2 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Real Estate Broker</div>
                           {REAL_ESTATE.map((house) => (
                              <MenuCard key={house.name} icon={<Home/>} title={house.name} desc={`$${house.value.toLocaleString()}`} 
                                 onClick={() => { if(character.bankBalance >= house.value) { updateBank(-house.value); setAssets(prev => [...prev, {id: generateId(), type: 'House', ...house}]); addLog(`Bought a ${house.name}!`, "good"); updateStat('happiness', 25); setActiveScreen('main'); } else addLog("Not enough money.", "bad"); }} />
                           ))}
                         </>
                      )}
                   </ScreenLayout>
                )}

                <div className="bg-gray-950/80 border-t border-gray-800/80 p-4 shrink-0 z-40 relative pb-safe shadow-[0_-20px_40px_rgba(0,0,0,0.5)] backdrop-blur-xl">
                  {character.isAlive && activeScreen === 'main' && (
                    <div className="grid grid-cols-5 gap-2 mb-4">
                      <NavBtn icon={<Users />} label="Social" onClick={() => setActiveScreen('relationships')} />
                      <NavBtn icon={<GraduationCap />} label="School" onClick={() => setActiveScreen('education')} />
                      <NavBtn icon={<Briefcase />} label="Jobs" onClick={() => setActiveScreen('jobs')} />
                      <NavBtn icon={<Home />} label="Assets" onClick={() => setActiveScreen('assets')} />
                      <NavBtn icon={<Activity />} label="Action" onClick={() => setActiveScreen('activities')} />
                    </div>
                  )}

                  <button
                    onClick={ageUp}
                    disabled={!character.isAlive}
                    className={`w-full py-4 rounded-[20px] font-black text-2xl tracking-wide shadow-2xl transition-all duration-200 active:scale-[0.97] ${
                      character.isAlive 
                        ? 'bg-gradient-to-r from-emerald-500 to-teal-500 text-white hover:from-emerald-400 hover:to-teal-400 shadow-emerald-900/40 hover:shadow-emerald-900/60' 
                        : 'bg-gray-900 text-gray-700 cursor-not-allowed border border-gray-800'
                    }`}
                  >
                    + AGE
                  </button>
                </div>
                
                {popupAlert && (
                  <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-in">
                     <div className="bg-gray-900 border border-gray-700 rounded-2xl p-6 shadow-2xl w-full text-center max-w-xs">
                         <div className={`mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 shadow-inner ${popupAlert.type === 'bad' ? 'bg-red-950/50 text-red-500 border border-red-900/50' : 'bg-emerald-950/50 text-emerald-500 border border-emerald-900/50'}`}>
                            {popupAlert.type === 'bad' ? <AlertCircle size={32} /> : <Heart size={32} />}
                         </div>
                         <h2 className="text-xl font-bold text-white mb-2">{popupAlert.title}</h2>
                         <p className="text-gray-400 mb-6 text-sm">{popupAlert.message}</p>
                         <button onClick={() => setPopupAlert(null)} className="w-full bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white font-bold py-3 rounded-xl transition-all active:scale-95">
                             Dismiss
                         </button>
                     </div>
                  </div>
                )}
                
              </div>
            </div>
          );
        }

        function StatBar({ icon, label, value, color }) {
          return (
            <div className="flex items-center gap-3 bg-gray-950/50 p-2 rounded-xl border border-gray-800/50 backdrop-blur-sm">
              <div className={`w-7 h-7 rounded-lg flex items-center justify-center ${color.replace('bg-', 'text-').replace('500', '400')} bg-gray-900 shadow-inner`}>{icon}</div>
              <div className="flex-1">
                <div className="flex justify-between text-[10px] font-black uppercase text-gray-500 mb-1 tracking-wider">
                  <span>{label}</span>
                  <span className="text-gray-400">{value}%</span>
                </div>
                <div className="h-1.5 w-full bg-gray-900 rounded-full overflow-hidden shadow-inner">
                  <div className={`h-full ${color} transition-all duration-700 ease-out shadow-[0_0_10px_rgba(255,255,255,0.2)]`} style={{ width: `${value}%` }} />
                </div>
              </div>
            </div>
          );
        }

        function MenuCard({ icon, title, desc, onClick, bg = 'bg-gray-800', color = 'text-gray-300', danger = false }) {
          return (
            <button onClick={onClick} className={`w-full p-4 rounded-2xl flex items-center mb-3 transition-all duration-200 active:scale-95 hover:-translate-y-0.5 text-left border shadow-sm hover:shadow-md ${danger ? 'bg-red-950/20 border-red-900/50 hover:border-red-500 hover:shadow-red-900/20' : 'bg-gray-900/60 border-gray-800 hover:border-emerald-500 hover:shadow-emerald-900/20'}`}>
              <div className={`p-3 rounded-xl mr-4 flex-shrink-0 shadow-inner ${danger ? 'bg-red-900/30 text-red-500' : `${bg} ${color}`}`}>
                {icon}
              </div>
              <div className="flex-1 min-w-0">
                <div className={`font-bold text-lg truncate ${danger ? 'text-red-400' : 'text-white'}`}>{title}</div>
                <div className="text-sm text-gray-400 truncate">{desc}</div>
              </div>
            </button>
          );
        }

        function NavBtn({ icon, label, onClick }) {
          return (
            <button onClick={onClick} className="flex flex-col items-center justify-center py-2.5 px-1 rounded-xl bg-gray-900/50 hover:bg-gray-800/80 border border-gray-800/50 hover:border-emerald-500/50 transition-all duration-200 active:scale-90 text-gray-400 hover:text-emerald-400 gap-1.5 shadow-sm">
              {React.cloneElement(icon, { size: 22 })}
              <span className="text-[9px] font-bold uppercase tracking-wide">{label}</span>
            </button>
          );
        }

        // Render the App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
