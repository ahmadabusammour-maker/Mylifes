<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyLife - Life Simulator</title>
    
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Load Phosphor Icons (replaces lucide-react module) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Load React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Load Babel for JSX translation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom Styles to replace external CSS dependencies */
        body { margin: 0; background-color: #000; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 20px); }
        
        /* Smooth pop-up animation */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(1rem); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: slideIn 0.2s ease-out forwards; }
        
        /* Glassmorphism helpers */
        .glass-panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>

        // --- Game Data & Regional Names ---

        const CAR_DEALER = [

        const REAL_ESTATE = [
          { name: "Tiny Trailer", value: 25000 },
          { name: "1-Bedroom Condo", value: 180000 },

        const VACATION_SPOTS = [
          { name: "Cancun, Mexico", baseCost: 500 },
          { name: "Hawaii, USA", baseCost: 800 },
          { name: "Rio de Janeiro, Brazil", baseCost: 1100 },
          { name: "Paris, France", baseCost: 1200 },
          { name: "Rome, Italy", baseCost: 1300 },

        const FLIGHT_CLASSES = [
          { name: "Economy", multiplier: 1, hap: 20, heal: 5 },
          { name: "Business", multiplier: 3, hap: 40, heal: 10 },
          { name: "First Class", multiplier: 8, hap: 80, heal: 20 }
        ];

        const PRO_TEAMS = {
            "Basketball": ["New York Knights", "Los Angeles Stars", "Chicago Bruisers", "Miami Tropics", "Texas Titans", "Boston Shamrocks", "Toronto Huskies", "Golden State Surf"],
            "Baseball": ["New York Empires", "Boston Patriots", "LA Sabers", "Chicago Winds", "Texas Longhorns", "Miami Sun", "Seattle Rain", "Atlanta Peaches"],
            "Soccer": ["London Royals", "Madrid Kings", "Paris Lights", "Munich Eagles", "LA Galaxy", "NY City FC", "Rome Gladiators", "Tokyo United"]
        };

        const ILLNESSES = [
            { name: "Common Cold", severity: 2, cureCost: 50, cureChance: 98 },
            { name: "Stomach Bug", severity: 4, cureCost: 80, cureChance: 95 },
            { name: "The Flu", severity: 6, cureCost: 150, cureChance: 90 },
            { name: "Food Poisoning", severity: 8, cureCost: 300, cureChance: 95 },
            { name: "Bacterial Infection", severity: 12, cureCost: 800, cureChance: 85 },
            { name: "Whooping Cough", severity: 15, cureCost: 1200, cureChance: 80 },
            { name: "Heart Disease", severity: 20, cureCost: 15000, cureChance: 40 },
            { name: "Cancer", severity: 25, cureCost: 25000, cureChance: 25 }
        ];

        const generateId = () => Math.random().toString(36).substr(2, 9);

        // --- Main Application ---
        function App() {
          const [appState, setAppState] = useState('start'); 
          const [activeScreen, setActiveScreen] = useState('main'); 
          const [customForm, setCustomForm] = useState({ firstName: '', lastName: '', gender: 'Male', country: 'United States of America', city: '', isRoyal: false });
          
          const [enrollmentProcess, setEnrollmentProcess] = useState(null);
          const [selectedMajor, setSelectedMajor] = useState(MAJORS[0]);
          const [selectedDest, setSelectedDest] = useState(VACATION_SPOTS[0]);
          const [selectedClass, setSelectedClass] = useState(FLIGHT_CLASSES[0]);
          const [vacationCompanions, setVacationCompanions] = useState([]);
          const [character, setCharacter] = useState(null);
          const [stats, setStats] = useState({ health: 0, happiness: 0, smarts: 0, looks: 0 });
          const [logs, setLogs] = useState([]);
          const [job, setJob] = useState(null);
          const [education, setEducation] = useState({ current: null, degrees: [] });
          const [relationships, setRelationships] = useState([]);
          const [assets, setAssets] = useState([]);
          const [popupAlert, setPopupAlert] = useState(null);
          
          const logContainerRef = useRef(null);

          useEffect(() => {
            if (logContainerRef.current) {
              logContainerRef.current.scrollTop = logContainerRef.current.scrollHeight;
            }
          }, [logs]);

          const generatePerson = (role, charAge, lastName, charCountry, fixedGender = null) => {
            const regionName = COUNTRY_REGIONS[charCountry] || "English";
            const region = REGIONAL_NAMES[regionName];
            const gender = fixedGender || (Math.random() > 0.5 ? 'Male' : 'Female');
            
            let age = 0;
            if (['Mother', 'Father'].includes(role)) {
                age = charAge + 20 + Math.floor(Math.random() * 15);
            } else if (role === 'Partner' || role === 'Friend') {
                age = charAge + Math.floor(Math.random() * 5) - 2;
                if (charAge >= 18 && age < 18) age = 18;
                if (charAge < 18 && age >= 18) age = 17;
            } else if (['Brother', 'Sister'].includes(role)) {
                age = charAge + Math.floor(Math.random() * 10) + 1;
            } else if (role === 'Coach') {
                age = charAge + 20 + Math.floor(Math.random() * 20);
            } else if (role === 'Teammate') {
                age = charAge + Math.floor(Math.random() * 3) - 1;
            }
            
            const finalLastName = ['Friend', 'Partner', 'Teammate', 'Coach'].includes(role)
                ? region.l[Math.floor(Math.random() * region.l.length)] 
                : lastName;

            return {
              id: generateId(),
              type: role,
              name: `${region[gender === 'Male' ? 'm' : 'f'][Math.floor(Math.random() * region[gender === 'Male' ? 'm' : 'f'].length)]} ${finalLastName}`,
              gender: gender,
              age: Math.max(0, age),
              relationshipLevel: Math.floor(Math.random() * 30) + 60 
            };
          };

          const startNewLife = (isCustom = false) => {
            let firstName, lastName, gender, country, city, isRoyal;

            if (isCustom) {
              country = customForm.country;
              const region = REGIONAL_NAMES[COUNTRY_REGIONS[country] || "English"];
              gender = customForm.gender;
              firstName = customForm.firstName.trim() || region[gender === 'Male' ? 'm' : 'f'][0];
              lastName = customForm.lastName.trim() || region.l[0];
              city = customForm.city.trim() || "The Capital";
              isRoyal = customForm.isRoyal;
            } else {
              country = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
              const region = REGIONAL_NAMES[COUNTRY_REGIONS[country] || "English"];
              gender = Math.random() > 0.5 ? "Male" : "Female";
              firstName = region[gender === 'Male' ? 'm' : 'f'][Math.floor(Math.random() * region[gender === 'Male' ? 'm' : 'f'].length)];
              lastName = region.l[Math.floor(Math.random() * region.l.length)];
              city = "Hometown";
              isRoyal = Math.random() < 0.02; 
            }
            
            setCharacter({
              name: `${firstName} ${lastName}`,
              gender, country, city,
              age: 0,
              bankBalance: isRoyal ? 1000000 : 0,
              isAlive: true,
              causeOfDeath: null,
              royalStatus: isRoyal ? (gender === 'Male' ? 'Prince' : 'Princess') : null,
              hasDriversLicense: false,
              hasSocialMedia: false,
              followers: 0,
              sports: { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] },
              illnesses: []
            });
        
            setStats({
              health: Math.floor(Math.random() * 30) + 70,
              happiness: Math.floor(Math.random() * 30) + 70,
              smarts: Math.floor(Math.random() * 70) + 30,
              looks: Math.floor(Math.random() * 70) + 30,
              athleticism: Math.floor(Math.random() * 70) + 30,
            });

            const isSameSexParents = Math.random() < 0.10;
            let p1Gender = Math.random() > 0.5 ? 'Male' : 'Female';
            let p2Gender = isSameSexParents ? p1Gender : (p1Gender === 'Male' ? 'Female' : 'Male');

            const parent1 = generatePerson(p1Gender === 'Male' ? 'Father' : 'Mother', 0, lastName, country, p1Gender);
            const parent2 = generatePerson(p2Gender === 'Male' ? 'Father' : 'Mother', 0, lastName, country, p2Gender);
            
            const initialSiblings = [];
            const numSiblings = Math.floor(Math.random() * 3); 
            for (let i = 0; i < numSiblings; i++) {
                const sibGender = Math.random() > 0.5 ? 'Male' : 'Female';
                initialSiblings.push(generatePerson(sibGender === 'Male' ? 'Brother' : 'Sister', 0, lastName, country, sibGender));
            }

            setRelationships([parent1, parent2, ...initialSiblings]);
            setJob(null);
            setEducation({ current: null, degrees: [] });
            setAssets([]);
            setEnrollmentProcess(null);
            setVacationCompanions([]);
            setPopupAlert(null);
            setActiveScreen('main');
            setAppState('playing');
            
            const royalText = isRoyal ? ` as a ${gender === 'Male' ? 'Prince' : 'Princess'}` : '';
            setLogs([{ id: generateId(), year: 0, text: `You were born${royalText} in ${city}, ${country}. Your parents are ${parent1.name} and ${parent2.name}.`, type: 'neutral' }]);
          };

          const continueAsChild = (child) => {
            let inheritedRoyal = null;
            if (character.royalStatus) {
                inheritedRoyal = child.gender === 'Male' ? 'King' : 'Queen'; 
            }

            const newChar = {
                name: child.name,
                gender: child.gender,
                country: character.country,
                city: character.city,
                age: child.age,
                bankBalance: character.bankBalance, 
                isAlive: true,
                causeOfDeath: null,
                royalStatus: inheritedRoyal,
                hasDriversLicense: child.age >= 16 ? Math.random() > 0.5 : false,
                hasSocialMedia: false,
                followers: 0,
                sports: { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] },
                illnesses: []
            };

            const newRelations = relationships
                .filter(r => r.id !== child.id) 
                .map(r => {
                    let newType = r.type;
                    if (['Spouse', 'Partner', 'Fiancé(e)'].includes(r.type)) {
                        newType = r.gender === 'Male' ? 'Father' : 'Mother';
                    } else if (['Son', 'Daughter'].includes(r.type)) {
                        newType = r.gender === 'Male' ? 'Brother' : 'Sister';
                    } else if (['Mother', 'Father'].includes(r.type)) {
                        newType = r.gender === 'Male' ? 'Grandfather' : 'Grandmother';
                    } else if (['Brother', 'Sister'].includes(r.type)) {
                        newType = r.gender === 'Male' ? 'Uncle' : 'Aunt';
                    } else if (['Grandfather', 'Grandmother', 'Uncle', 'Aunt'].includes(r.type)) {
                        return null; 
                    }
                    return { ...r, type: newType };
                }).filter(Boolean); 

            setRelationships(newRelations);
            setCharacter(newChar);
            
            setStats({ 
                health: Math.floor(Math.random() * 30) + 70, 
                happiness: Math.floor(Math.random() * 30) + 70, 
                smarts: Math.floor(Math.random() * 70) + 30, 
                looks: Math.floor(Math.random() * 70) + 30,
                athleticism: Math.floor(Math.random() * 70) + 30
            });
        
            setEducation({ 
                current: child.age >= 6 && child.age < 18 ? "High School" : null, 
                degrees: child.age >= 18 ? ["High School"] : [] 
            });
            
            setJob(null);
            setEnrollmentProcess(null);
            setVacationCompanions([]);
            setPopupAlert(null);
            setLogs([{ id: generateId(), year: child.age, text: `Following the tragic passing of your parent, you are now playing as ${child.name}, continuing your family's legacy. You inherited $${character.bankBalance.toLocaleString()} and all their assets!`, type: 'good' }]);
            setActiveScreen('main');
          };

          const addLog = (text, type = 'neutral') => {
            setLogs(prev => [...prev, { id: generateId(), year: character ? character.age : 0, text, type }]);
          };

          const updateStat = (statName, amount) => {
            setStats(prev => ({ ...prev, [statName]: Math.min(100, Math.max(0, prev[statName] + amount)) }));
          };

          const updateBank = (amount) => {
            setCharacter(prev => ({ ...prev, bankBalance: prev.bankBalance + amount }));
          };

          const updateRelationship = (id, amount) => {
            setRelationships(prev => prev.map(r => r.id === id ? { ...r, relationshipLevel: Math.min(100, Math.max(0, r.relationshipLevel + amount)) } : r));
          };

          const updateMultipleRelationships = (ids, amount) => {
            setRelationships(prev => prev.map(r => ids.includes(r.id) ? { ...r, relationshipLevel: Math.min(100, Math.max(0, r.relationshipLevel + amount)) } : r));
          };

          const ageUp = () => {
            if (!character.isAlive) return;

            setActiveScreen('main');
            const newAge = character.age + 1;
            let netIncome = 0;
            
            addLog(`--- Age ${newAge} ---`, "header");

            if (newAge === 6) {
              setEducation(prev => ({ ...prev, current: "High School" }));
              addLog("You started Elementary School.", "neutral");
            } else if (newAge === 18 && education.current === "High School") {
              setEducation(prev => ({ current: null, degrees: [...prev.degrees, "High School"] }));
              addLog("You graduated from High School!", "good");
              if (job && job.maxAge && newAge > job.maxAge) {
                  addLog(`You are too old for your job as a ${job.title} and had to leave.`, "neutral");
                  setJob(null);
              }
            }

            if (newAge >= 6 && newAge < 18) {
                const parentsAlive = relationships.filter(r => (r.type === 'Mother' || r.type === 'Father') && !r.dead).length;
                if (parentsAlive > 0 && Math.random() > 0.3) {
                    const allowance = Math.floor(Math.random() * 40) + 10;
                    updateBank(allowance);
                    addLog(`Your parents gave you $${allowance} for your allowance.`, "good");
                }
            }

            if (job) {
              netIncome += job.salary;
              addLog(`You earned $${job.salary.toLocaleString()} as a ${job.title}.`, "good");
              updateStat('health', -2); 
            }

            if (character.royalStatus) {
              const royalPay = character.royalStatus === 'King' || character.royalStatus === 'Queen' ? 5000000 : 1500000;
              netIncome += royalPay;
              addLog(`You received $${royalPay.toLocaleString()} from your royal duties.`, "good");
              updateStat('looks', 2); 
            }

            if (character.hasSocialMedia) {
                let followerGrowth = Math.floor(character.followers * (Math.random() * 0.1)); 
                if (stats.looks > 80 || stats.happiness > 80) followerGrowth += Math.floor(Math.random() * 500);
                
                const newFollowers = character.followers + followerGrowth;
                setCharacter(prev => ({ ...prev, followers: newFollowers }));

                if (newFollowers > 100000) {
                    const adRevenue = Math.floor(newFollowers * 0.05); 
                    netIncome += adRevenue;
                    addLog(`Your social media presence earned you $${adRevenue.toLocaleString()} in sponsorships!`, "good");
                }
            }

            if (newAge >= 18) {
              let expenses = Math.floor(netIncome * 0.2); 
              assets.forEach(asset => {
                expenses += Math.floor(asset.value * 0.05); 
              });
              if (expenses > 0) {
                 netIncome -= expenses;
                 addLog(`You paid $${expenses.toLocaleString()} in taxes and living expenses.`, "bad");
              }
            }

            if (netIncome !== 0) updateBank(netIncome);

            let currentSports = { ...character.sports };
            if (currentSports.team) {
                const perfChange = Math.floor((stats.athleticism - 50) / 10) + Math.floor(Math.random() * 11) - 5;
                currentSports.performance = Math.min(100, Math.max(0, currentSports.performance + perfChange));
                
                if (currentSports.coach) currentSports.coach.age++;
                if (currentSports.roster) currentSports.roster.forEach(t => t.age++);
                
                if (currentSports.level === 'Pro') {
                    const proSalary = 500000 + (currentSports.performance * 100000); 
                    updateBank(proSalary);
                    addLog(`You earned $${proSalary.toLocaleString()} playing pro ${currentSports.sport.toLowerCase()}!`, "good");
                    updateStat('health', -5); 
                    
                    if (newAge > 35 && Math.random() < (newAge - 35) * 0.1) {
                        addLog(`Your body can't keep up anymore. You retired from pro ${currentSports.sport.toLowerCase()}.`, "neutral");
                        currentSports = { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] };
                    }
                } else if (currentSports.level === 'Middle School' && newAge > 14) {
                    addLog(`You graduated middle school and finished your ${currentSports.sport.toLowerCase()} season.`, "neutral");
                    currentSports = { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] };
                } else if (currentSports.level === 'High School' && newAge > 18) {
                    addLog(`You graduated and finished your high school ${currentSports.sport.toLowerCase()} career.`, "neutral");
                    currentSports = { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] };
                } else if (currentSports.level === 'College' && (!education.current || !education.current.includes("University") || newAge > 24)) {
                    addLog(`You finished your college ${currentSports.sport.toLowerCase()} career.`, "neutral");
                    currentSports = { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] };
                }
            }

            // Apply Illness and regular drain
            let healthDrain = Math.floor(Math.random() * 4);
            let activeIllnesses = [...(character.illnesses || [])];
            
            if (activeIllnesses.length > 0) {
                activeIllnesses.forEach(ill => {
                    healthDrain += ill.severity;
                    addLog(`You are suffering from ${ill.name}.`, "bad");
                });
            }

            updateStat('health', -healthDrain);
            updateStat('looks', newAge > 30 ? -Math.floor(Math.random() * 3) : 0);
            updateStat('athleticism', -Math.floor(Math.random() * 4));
            
            // Contract new illnesses
            if (Math.random() < 0.15) {
                let possibleIlls = ILLNESSES.filter(i => newAge > 50 ? true : i.severity < 20);
                if (newAge > 40 && Math.random() < 0.2) possibleIlls = ILLNESSES.filter(i => i.severity >= 15);
                
                const sickness = possibleIlls[Math.floor(Math.random() * possibleIlls.length)];
                if (!activeIllnesses.some(i => i.name === sickness.name)) {
                    activeIllnesses.push(sickness);
                    setPopupAlert({ title: "Medical Alert", message: `You have been diagnosed with ${sickness.name}.`, type: "bad" });
                    addLog(`You contracted ${sickness.name}.`, "bad");
                }
            }

            let relationsCpy = [...relationships];
            relationsCpy = relationsCpy.map(r => {
                const rNewAge = r.age + 1;
                
                if (r.type !== 'Pet' && rNewAge > 65 && Math.random() < (rNewAge - 65) * 0.015) {
                    addLog(`Your ${r.type.toLowerCase()}, ${r.name}, has passed away at age ${rNewAge}.`, "bad");
                    updateStat('happiness', -30);
                    
                    if ((r.type === 'Mother' || r.type === 'Father') && (character.royalStatus === 'Prince' || character.royalStatus === 'Princess')) {
                        const newTitle = character.gender === 'Male' ? 'King' : 'Queen';
                        setCharacter(prev => ({ ...prev, royalStatus: newTitle }));
                        addLog(`You have ascended to the throne! You are now the ${newTitle} of ${character.country}.`, "good");
                    }
                    return { ...r, dead: true };
                }
                
                if (r.type === 'Pet' && rNewAge > 10 && Math.random() < (rNewAge - 10) * 0.1) {
                    addLog(`Your beloved pet ${r.species}, ${r.name}, has passed away.`, "bad");
                    updateStat('happiness', -20);
                    return { ...r, dead: true };
                }
                
                return { ...r, age: rNewAge };
            });

            setRelationships(relationsCpy.filter(r => !r.dead));
            setCharacter(prev => ({ ...prev, age: newAge, sports: currentSports, illnesses: activeIllnesses }));

            // Standard Random Events
            if (Math.random() < 0.2) {
              if (newAge < 18) {
                 addLog("You learned a cool new trick today.", "good"); 
                 updateStat('happiness', 10); 
              } else {
                if (Math.random() < 0.5) { 
                    addLog("You had a really stressful day.", "bad"); 
                    updateStat('happiness', -10); 
                } else { 
                    addLog("You found $50 in an old jacket pocket!", "good"); 
                    updateBank(50); 
                }
              }
            }

            if (stats.health - healthDrain <= 0) {
              die("You succumbed to your poor health.");
            } else if (newAge > 65 && Math.random() * 100 < (newAge - 65) * 1.5) {
              die("You died of natural causes.");
            }
          };

          const die = (reason) => {
            setCharacter(prev => ({ ...prev, isAlive: false, causeOfDeath: reason }));
            addLog(reason, "bad");
            addLog("GAME OVER", "bad");
          };

          const startEnrollment = (school, cost, needsMajor = false) => {
            if (needsMajor) {
              setEnrollmentProcess({ school, cost });
              setSelectedMajor(MAJORS[0]);
            } else {
              applyEducation(school, cost, null);
            }
          };

          const applyEducation = (school, cost, major = null) => {
            const degreeName = major ? `${school} (${major})` : school;
            if (education.current) {
              addLog(`You are already enrolled in ${education.current}.`, "bad");
              return;
            }
            if (character.bankBalance >= cost) {
              updateBank(-cost);
              setEducation(prev => ({ ...prev, current: degreeName }));
              addLog(`You paid $${cost.toLocaleString()} and enrolled in ${degreeName}!`, "good");
              updateStat('smarts', 5);
            } else if (school === "University" && stats.athleticism > 85) {
               setEducation(prev => ({ ...prev, current: degreeName }));
               addLog(`Your incredible athletic skills earned you a full sports scholarship to ${degreeName}!`, "good");
            } else if (stats.smarts > 85) {
               setEducation(prev => ({ ...prev, current: degreeName }));
               addLog(`Your high smarts earned you a full scholarship to ${degreeName}!`, "good");
            } else {
              addLog(`You cannot afford the $${cost.toLocaleString()} tuition.`, "bad");
            }
            setEnrollmentProcess(null);
            setActiveScreen('main');
          };

          const graduate = () => {
            addLog(`You successfully graduated from ${education.current}!`, "good");
            setEducation(prev => ({ degrees: [...prev.degrees, prev.current], current: null }));
            updateStat('happiness', 20);
            setActiveScreen('main');
          };

          const dropOut = () => {
            addLog(`You dropped out of ${education.current}.`, "neutral");
            setEducation(prev => ({ ...prev, current: null }));
            updateStat('happiness', -10);
            setActiveScreen('main');
          };

          const bookVacation = () => {
            const totalPeople = 1 + vacationCompanions.length;
            const cost = selectedDest.baseCost * selectedClass.multiplier * totalPeople;
            if (character.bankBalance >= cost) {
              updateBank(-cost);
              addLog(`You flew ${selectedClass.name} class to ${selectedDest.name}${vacationCompanions.length > 0 ? ` with ${vacationCompanions.length} companion(s)` : ''}!`, "good");
              updateStat('happiness', selectedClass.hap);
              updateStat('health', selectedClass.heal);
              updateMultipleRelationships(vacationCompanions, 25);
              setVacationCompanions([]);
              setActiveScreen('main');
            } else {
              addLog(`You can't afford the $${cost.toLocaleString()} trip to ${selectedDest.name} for ${totalPeople} people.`, "bad");
            }
          };

          const treatIllness = (ill) => {
              const cost = character.age < 18 ? 0 : ill.cureCost;
              if (character.bankBalance >= cost || character.age < 18) {
                  updateBank(-cost);
                  const success = Math.random() * 100 < ill.cureChance;
                  if (success) {
                      addLog(`The doctor successfully treated your ${ill.name}!`, "good");
                      updateStat('health', ill.severity * 2);
                      setCharacter(prev => ({ ...prev, illnesses: prev.illnesses.filter(i => i.name !== ill.name) }));
                      setPopupAlert({ title: "Treatment Successful", message: `Your ${ill.name} has been completely cured!`, type: "good" });
                  } else {
                      addLog(`The treatment for ${ill.name} was unsuccessful.`, "bad");
                      setPopupAlert({ title: "Treatment Failed", message: `The doctors tried their best, but your ${ill.name} persists.`, type: "bad" });
                  }
              } else {
                  addLog(`You cannot afford the $${cost.toLocaleString()} treatment for ${ill.name}.`, "bad");

              }
          };

          const activityStudy = () => {
            if (Math.random() > 0.4) {
              addLog("You studied hard and feel much smarter.", "good");
              updateStat('smarts', Math.floor(Math.random() * 4) + 2);
            } else {
              addLog("You tried to study but couldn't focus.", "neutral");
              updateStat('happiness', -2);
            }
            setActiveScreen('main');
          };

          const activityRead = () => {
            addLog("You spent the afternoon reading a fascinating book.", "good");
            updateStat('smarts', 2);
            updateStat('happiness', 3);
            setActiveScreen('main');
          };

          const activityLibrary = () => {
            addLog("You spent some quiet time studying at the local library.", "good");
            updateStat('smarts', Math.floor(Math.random() * 3) + 1);
            setActiveScreen('main');
          };

          const activityMeditate = () => {
            addLog("You meditated and feel deeply at peace.", "good");
            updateStat('happiness', Math.floor(Math.random() * 4) + 2);
            updateStat('health', 1);
            setActiveScreen('main');
          };

          const activityVolunteer = () => {
            addLog("You volunteered your time to help the community.", "good");
            updateStat('happiness', 15);
            updateStat('looks', 1); 
            setActiveScreen('main');
          };

          const makeFriend = () => {
            const friend = generatePerson('Friend', character.age, 'Unknown', character.country);
            setRelationships(prev => [...prev, friend]);
            addLog(`You hung out and became friends with ${friend.name}!`, "good");
            updateStat('happiness', 10);
            setActiveScreen('main');
          };

          const findDate = () => {
            const partner = generatePerson('Partner', character.age, 'Unknown', character.country);
            setRelationships(prev => [...prev, partner]);
            addLog(`You asked out ${partner.name} and they said yes!`, "good");
            updateStat('happiness', 15);
            setActiveScreen('main');
          };

          const takeDrivingTest = () => {
              if (character.bankBalance >= 50) {
                  updateBank(-50);
                  const passed = Math.random() * 100 < stats.smarts + 20; 
                  if (passed) {
                      setCharacter(prev => ({ ...prev, hasDriversLicense: true }));
                      addLog("You passed your driving test and got your license!", "good");
                      updateStat('happiness', 20);
                  } else {
                      addLog("You failed your driving test. Try again next year.", "bad");
                      updateStat('happiness', -10);
                  }
              } else {
                  addLog("You don't have $50 for the driving test.", "bad");
              }
              setActiveScreen('main');
          };

          const useSocialMedia = () => {
              if (character.age < 9) {
                  addLog("You must be at least 9 years old to create a social media account.", "bad");
                  return;
              }
              if (!character.hasSocialMedia) {
                  setCharacter(prev => ({ ...prev, hasSocialMedia: true, followers: 0 }));
                  addLog("You created a new social media profile!", "good");
                  setActiveScreen('main');
                  return;
              }

              const roll = Math.random();
              if (roll < 0.1) {
                  const lost = Math.floor(character.followers * 0.05) + 1;
                  setCharacter(prev => ({ ...prev, followers: Math.max(0, prev.followers - lost) }));
                  addLog("You posted a cringe video. You lost followers.", "bad");
                  updateStat('happiness', -5);
              } else if (roll < 0.9) {
                  const gained = Math.floor(Math.random() * 50) + 10;
                  setCharacter(prev => ({ ...prev, followers: prev.followers + gained }));
                  addLog(`Your post did okay. You gained ${gained} followers!`, "good");
              } else {
                  const viralGained = Math.floor(Math.random() * 10000) + 500;
                  setCharacter(prev => ({ ...prev, followers: prev.followers + viralGained }));
                  addLog(`Your post WENT VIRAL! You gained ${viralGained.toLocaleString()} followers!`, "good");
                  updateStat('happiness', 25);
              }
              setActiveScreen('main');
          };

          const adoptPet = () => {
            if (character.bankBalance >= 50) {
              updateBank(-50);
              const petTypes = ["Dog", "Cat", "Rabbit", "Parrot"];
              const species = petTypes[Math.floor(Math.random() * petTypes.length)];
              const petGender = Math.random() > 0.5 ? 'Male' : 'Female';
              const petName = `Your ${species}`;
              
              const newPet = { id: generateId(), type: 'Pet', species, name: petName, gender: petGender, age: 0, relationshipLevel: 80 };
              setRelationships(prev => [...prev, newPet]);
              addLog(`You adopted a cute ${species.toLowerCase()}!`, "good");
              updateStat('happiness', 25);
            } else {
              addLog("You don't have $50 to adopt a pet.", "bad");
            }
            setActiveScreen('main');
          };

          const interact = (person, action) => {
            if (person.type === 'Pet') {
                if (action === 'spend_time') {
                    addLog(`You played with ${person.name}. So fun!`, "good");
                    updateRelationship(person.id, 10);
                    updateStat('happiness', 10);
                } else if (action === 'treat') {
                    addLog(`You gave ${person.name} a yummy treat!`, "good");
                    updateRelationship(person.id, 15);
                }
            } else {
                if (action === 'spend_time') {
                  addLog(`You spent quality time with your ${person.type.toLowerCase()}, ${person.name}.`, "neutral");
                  updateRelationship(person.id, 10);
                  updateStat('happiness', 5);
                } else if (action === 'converse') {
                  addLog(`You had a nice conversation with ${person.name}.`, "neutral");
                  updateRelationship(person.id, 5);
                } else if (action === 'compliment') {
                  addLog(`You complimented ${person.name}. They smiled!`, "good");
                  updateRelationship(person.id, 15);
                } else if (action === 'insult') {
                  addLog(`You insulted ${person.name}. They were upset.`, "bad");
                  updateRelationship(person.id, -30);
                  updateStat('happiness', -5);
                } else if (action === 'propose') {
                  if (person.relationshipLevel > 70) {
                    addLog(`You proposed to ${person.name} and they said YES!`, "good");
                    setRelationships(prev => prev.map(r => r.id === person.id ? { ...r, type: 'Fiancé(e)' } : r));
                    updateStat('happiness', 30);
                  } else {
                    addLog(`You proposed to ${person.name} but they rejected you. Ouch.`, "bad");
                    updateRelationship(person.id, -20);
                    updateStat('happiness', -20);
                  }
                } else if (action === 'marry') {
                  if (character.bankBalance >= 5000) {
                      addLog(`You and ${person.name} got married in a beautiful ceremony!`, "good");
                      setRelationships(prev => prev.map(r => r.id === person.id ? { ...r, type: 'Spouse' } : r));
                      updateBank(-5000); 
                      updateStat('happiness', 40);
                  } else {
                      addLog(`You cannot afford the $5,000 cost to marry ${person.name}.`, "bad");
                  }
                } else if (action === 'have_baby') {
                  const region = REGIONAL_NAMES[COUNTRY_REGIONS[character.country] || "English"];
                  const babyGender = Math.random() > 0.5 ? 'Male' : 'Female';
                  const babyName = region[babyGender === 'Male' ? 'm' : 'f'][Math.floor(Math.random() * region[babyGender === 'Male' ? 'm' : 'f'].length)];
                  const lastName = character.name.includes(' ') ? character.name.substring(character.name.indexOf(' ') + 1) : "Unknown";
                  const baby = { id: generateId(), type: babyGender === 'Male' ? 'Son' : 'Daughter', name: `${babyName} ${lastName}`, age: 0, gender: babyGender, relationshipLevel: 100 };
                  setRelationships(prev => [...prev, baby]);
                  addLog(`You welcomed a beautiful baby ${babyGender.toLowerCase()} named ${baby.name}!`, "good");
                  updateStat('happiness', 50);
                } else if (action === 'break_up') {
                  addLog(`You broke up with ${person.name}.`, "neutral");
                  updateStat('happiness', -20);
                  setRelationships(prev => prev.filter(r => r.id !== person.id));
                }
            }
            setActiveScreen('main');
          };

          const tryOutSport = (sportName, level) => {
              if (character.sports.team) {
                  addLog("You are already on a team!", "bad");
                  return;
              }
              const requiredAthleticism = level === 'Pro' ? 90 : level === 'College' ? 70 : 40;
              const chance = (stats.athleticism - requiredAthleticism) + 50 + Math.random() * 20;
              if (chance > 50) {
                  let teamPrefix = character.gender === 'Male' ? "Boys" : "Girls";
                  if (level === 'College' || level === 'Pro') teamPrefix = character.gender === 'Male' ? "Men's" : "Women's";
                  
                  let teamName = `${level} ${sportName}`;
                  if (level === 'Pro') {
                      teamName = PRO_TEAMS[sportName][Math.floor(Math.random() * PRO_TEAMS[sportName].length)];
                  }
                  const fullTeamName = level === 'Pro' ? teamName : `${teamPrefix} ${teamName}`;

                  const coach = generatePerson('Coach', character.age, 'Unknown', character.country, Math.random() > 0.5 ? 'Male' : 'Female');
                  const roster = Array.from({length: 4}).map(() => generatePerson('Teammate', character.age, 'Unknown', character.country, character.gender));

                  if (level === 'Pro') {
                      addLog(`You were signed by the ${fullTeamName} to play pro ${sportName}!`, "good");
                      updateStat('happiness', 50);
                  } else {
                      addLog(`You made the ${fullTeamName} team!`, "good");
                      updateStat('happiness', 20);
                  }
                  setCharacter(prev => ({ ...prev, sports: { level, sport: sportName, team: fullTeamName, performance: 50, coach, roster } }));
              } else {
                  addLog(`You failed the tryouts for the ${level} ${sportName} team.`, "bad");
                  updateStat('happiness', -10);
              }
              setActiveScreen('main');
          };
          
          const practiceSport = () => {
              addLog("You practiced hard and improved your athleticism.", "good");
              updateStat('athleticism', Math.floor(Math.random() * 5) + 2);
              if (character.sports.team) {
                  setCharacter(prev => ({ ...prev, sports: { ...prev.sports, performance: Math.min(100, prev.sports.performance + 5) } }));
              }
              updateStat('health', 2);
              setActiveScreen('main');
          };
          
          const quitSport = () => {
              addLog(`You quit the ${character.sports.team}.`, "neutral");
              setCharacter(prev => ({ ...prev, sports: { level: 'None', sport: null, team: null, performance: 0, coach: null, roster: [] } }));
              setActiveScreen('main');
          };

          const befriendTeammate = (teammate) => {
              if (relationships.some(r => r.id === teammate.id)) return;
              const friend = { ...teammate, type: 'Friend', relationshipLevel: 60 };
              setRelationships(prev => [...prev, friend]);
              addLog(`You became friends with your teammate, ${teammate.name}!`, "good");
              updateStat('happiness', 10);
          };

          const ScreenLayout = ({ title, children }) => (
            <div className="absolute inset-0 bg-gray-950/95 backdrop-blur-md z-30 flex flex-col animate-in slide-in-from-bottom-4 duration-200">
              <div className="bg-gray-900/80 p-4 border-b border-gray-800 flex items-center gap-3 shrink-0 shadow-lg backdrop-blur-xl">
                <button onClick={() => setActiveScreen('main')} className="p-2 -ml-2 text-gray-400 hover:text-white rounded-full hover:bg-gray-800 transition-colors">
                  <ArrowLeft size={24} />
                </button>
                <h2 className="text-xl font-bold text-white flex-1">{title}</h2>
              </div>
              <div className="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar pb-24">
                {children}
              </div>
            </div>
          );

          if (appState === 'start') {
            return (
              <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center text-white p-4">
                <div className="w-full max-w-sm bg-gray-900 p-8 rounded-3xl shadow-[0_0_50px_rgba(16,185,129,0.1)] border border-gray-800 text-center space-y-8">
                  <div>
                    <h1 className="text-6xl font-black bg-gradient-to-br from-emerald-400 to-teal-600 bg-clip-text text-transparent mb-2">MyLife</h1>
                    <p className="text-gray-400 text-sm font-medium tracking-wide uppercase">Live your way</p>
                  </div>
                  
                  <div className="space-y-3">
                    <button onClick={() => startNewLife(false)} className="w-full py-4 rounded-2xl font-bold text-lg bg-emerald-600 hover:bg-emerald-500 transition-all active:scale-95 text-white flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/20">
                      <RefreshCw size={20} /> Random Life
                    </button>
                    <button onClick={() => setAppState('custom')} className="w-full py-4 rounded-2xl font-bold text-lg bg-gray-800 hover:bg-gray-700 border border-gray-700 transition-all active:scale-95 text-white flex items-center justify-center gap-2">
                      <Settings size={20} /> Custom Life
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          if (appState === 'custom') {
            return (
              <div className="min-h-screen bg-gray-950 flex flex-col items-center justify-center text-white p-4">
                <div className="w-full max-w-sm bg-gray-900 p-6 rounded-3xl shadow-2xl border border-gray-800 flex flex-col max-h-[90vh]">
                  <div className="flex items-center mb-6 shrink-0">
                    <button onClick={() => setAppState('start')} className="p-2 -ml-2 text-gray-400 hover:text-white mr-2"><ArrowLeft size={24} /></button>
                    <h2 className="text-2xl font-bold">Custom Life</h2>
                  </div>
                  
                  <div className="space-y-4 overflow-y-auto flex-1 pr-2 custom-scrollbar">
                    <div><label className="block text-xs font-bold uppercase text-gray-500 mb-1">First Name</label><input type="text" value={customForm.firstName} onChange={e => setCustomForm({...customForm, firstName: e.target.value})} placeholder="Leave blank for random" className="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 transition-colors" /></div>
                    <div><label className="block text-xs font-bold uppercase text-gray-500 mb-1">Last Name</label><input type="text" value={customForm.lastName} onChange={e => setCustomForm({...customForm, lastName: e.target.value})} placeholder="Leave blank for random" className="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-white focus:outline-none focus:border-emerald-500 transition-colors" /></div>
                    <div className="grid grid-cols-2 gap-3">
                      <div><label className="block text-xs font-bold uppercase text-gray-500 mb-1">Gender</label><select value={customForm.gender} onChange={e => setCustomForm({...customForm, gender: e.target.value})} className="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-white focus:outline-none appearance-none"><option value="Male">Male</option><option value="Female">Female</option></select></div>

                  </div>

                    <StatBar icon={<Brain size={14} />} label="Smarts" value={stats.smarts} color="bg-blue-500" />

                <div className="flex-1 overflow-y-auto p-5 space-y-3 scroll-smooth bg-gray-950 custom-scrollbar" ref={logContainerRef}>

                                <div className="text-xs font-bold text-gray-500 uppercase tracking-widest mb-2">Continue Legacy</div>

                          Main Menu

                      </div>
                    </div>

                {activeScreen === 'activities' && (
                  <ScreenLayout title="Activities">
                    {character.age >= 9 && (
                        <div className="bg-gray-900 border border-gray-800 rounded-2xl p-4 mb-4">

                           {character.hasSocialMedia && <div className="text-emerald-400 font-bold mb-3">{character.followers.toLocaleString()} Followers</div>}
                           <MenuCard icon={<Smartphone />} title={character.hasSocialMedia ? "Post Update" : "Create Account"} desc={character.hasSocialMedia ? "Try to go viral" : "Start building your following"} onClick={useSocialMedia} color="text-purple-400" bg="bg-purple-950/30" />
                        </div>
                    )}

                    {character.age >= 11 && <MenuCard icon={<Trophy />} title="Sports & Athletics" desc="Join a team, practice, or go pro" onClick={() => setActiveScreen('sports')} color="text-yellow-500" bg="bg-yellow-950/30" />}
                    <MenuCard icon={<FirstAid />} title="Medical Center" desc="Checkups and Treatments" onClick={() => setActiveScreen('doctor')} color="text-red-400" bg="bg-red-950/30" />

                    {character.age >= 16 && !character.hasDriversLicense && (
                        <MenuCard icon={<IdCard />} title="Take Driving Test" desc="Get your license ($50)" onClick={takeDrivingTest} color="text-orange-400" bg="bg-orange-950/30" />
                    )}

                    {character.age >= 4 && <MenuCard icon={<UserPlus />} title="Make a Friend" desc="Go out and meet someone new" onClick={makeFriend} color="text-pink-400" bg="bg-pink-950/30" />}
                    {character.age >= 6 && <MenuCard icon={<BookOpen />} title="Study Hard" desc="Attempt to improve your smarts" onClick={activityStudy} color="text-blue-400" bg="bg-blue-950/30" />}
                    {character.age >= 4 && <MenuCard icon={<BookOpen />} title="Visit Library" desc="Read books for free" onClick={activityLibrary} color="text-indigo-400" bg="bg-indigo-950/30" /> }
                    {character.age >= 4 && <MenuCard icon={<Book />} title="Read a Book" desc="Enjoy some casual reading" onClick={activityRead} color="text-indigo-400" bg="bg-indigo-950/30" />}
                    {character.age >= 8 && <MenuCard icon={<Sparkles />} title="Meditate" desc="Find your inner peace" onClick={activityMeditate} color="text-purple-400" bg="bg-purple-950/30" /> }
                    {character.age >= 18 && <MenuCard icon={<Dog />} title="Adopt a Pet" desc="Visit the animal shelter ($50)" onClick={adoptPet} color="text-yellow-400" bg="bg-yellow-950/30" />}
                    {character.age >= 12 && <MenuCard icon={<Heart />} title="Find a Date" desc="Look for romance" onClick={findDate} color="text-pink-400" bg="bg-pink-950/30" />}
                    
                    {character.age >= 12 && (
                        <MenuCard icon={<Dumbbell />} title="Hit the Gym" desc={character.age >= 18 ? "$20 fee" : "Free"} onClick={() => { 
                            if(character.age >= 18 && character.bankBalance < 20) {
                                addLog("You cannot afford the $20 gym fee.", "bad");
                                setActiveScreen('main');
                                return;
                            }
                            updateBank(character.age >= 18 ? -20 : 0); 
                            updateStat('health', 5); 
                            updateStat('looks', 2); 
                            addLog("You had a great workout.", "good"); 
                            setActiveScreen('main'); 
                        }} color="text-orange-400" bg="bg-orange-950/30" /> 
                    )}
                  </ScreenLayout>
                )}

                {activeScreen === 'doctor' && (
                  <ScreenLayout title="Medical Center">
                    <div className="bg-gray-900 border border-red-800/50 rounded-2xl p-5 mb-4 shadow-lg animate-in slide-in-from-bottom-2">
                        <h3 className="text-lg font-bold text-white mb-2">Your Health Records</h3>
                        {character.illnesses && character.illnesses.length > 0 ? (
                            <div className="space-y-4">
                                <p className="text-gray-400 text-sm mb-4">You have active diagnoses. Seek treatment immediately!</p>
                                {character.illnesses.map(ill => (
                                    <div key={ill.name} className="bg-gray-950 p-4 rounded-xl border border-gray-800">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="font-bold text-red-400 text-lg">{ill.name}</span>
                                            <span className="text-xs font-bold text-gray-500 uppercase">Severity: {ill.severity}</span>
                                        </div>
                                        <button onClick={() => treatIllness(ill)} className="w-full bg-red-950/30 hover:bg-red-900/50 text-red-400 font-bold py-3 rounded-xl transition-all border border-red-900/50 flex justify-between items-center px-4">
                                            <span>Treat Illness</span>
                                            <span>{character.age < 18 ? 'Free' : `$${ill.cureCost.toLocaleString()}`}</span>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-6">
                                <div className="mx-auto w-16 h-16 bg-emerald-950/30 text-emerald-500 rounded-full flex items-center justify-center mb-4">
                                    <Heart size={32} />
                                </div>
                                <p className="text-emerald-400 font-bold text-lg mb-1">Perfectly Healthy!</p>
                                <p className="text-gray-400 text-sm mb-6">You currently have no diagnosed illnesses.</p>
                                <button onClick={() => { 
                                    if(character.age >= 18 && character.bankBalance < 50) { addLog("You cannot afford a checkup.", "bad"); setActiveScreen('main'); return; }
                                    updateBank(character.age < 18 ? 0 : -50); updateStat('health', 5); addLog("You got a routine checkup.", "good"); setActiveScreen('main'); 
                                }} className="w-full bg-emerald-950/30 hover:bg-emerald-900/50 text-emerald-400 font-bold py-3 rounded-xl transition-all border border-emerald-900/50">
                                    Routine Checkup ({character.age < 18 ? 'Free' : '$50'})
                                </button>
                            </div>
                        )}
                    </div>
                  </ScreenLayout>
                )}

                {activeScreen === 'sports' && (
                  <ScreenLayout title="Sports & Athletics">

                        <StatBar icon={<Dumbbell size={14} />} label="Athleticism" value={stats.athleticism} color="bg-orange-500" />
                        
                        {character.sports.team ? (
                            <div className="mt-4 pt-4 border-t border-gray-800">
                                <div className="text-white font-bold text-lg">{character.sports.team}</div>
                                <div className="text-gray-400 text-sm mb-2">{character.sports.level} {character.sports.sport}</div>
                                <StatBar icon={<Medal size={14} />} label="Performance" value={character.sports.performance} color="bg-yellow-500" />
                                
                                {character.sports.coach && (
                                    <div className="mt-5 mb-2">
                                        <h4 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Coaching Staff</h4>
                                        <div className="flex justify-between items-center bg-gray-950 p-3 rounded-xl border border-gray-800">
                                            <div>
                                                <div className="font-bold text-white text-sm">{character.sports.coach.name}</div>
                                                <div className="text-xs text-gray-400">Head Coach • Age {character.sports.coach.age}</div>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {character.sports.roster && character.sports.roster.length > 0 && (
                                    <div className="mt-4 mb-4">
                                        <h4 className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Team Roster</h4>
                                        <div className="space-y-2">
                                            {character.sports.roster.map(t => {
                                                const isFriend = relationships.some(r => r.id === t.id);
                                                return (
                                                    <div key={t.id} className="flex justify-between items-center bg-gray-950 p-3 rounded-xl border border-gray-800">
                                                        <div>
                                                            <div className="font-bold text-white text-sm">{t.name}</div>
                                                            <div className="text-xs text-gray-400">Teammate • Age {t.age}</div>
                                                        </div>
                                                        {!isFriend ? (
                                                            <button onClick={() => befriendTeammate(t)} className="text-xs font-bold text-pink-400 bg-pink-950/30 px-3 py-1.5 rounded-lg border border-pink-900/50 hover:bg-pink-900/50 transition-colors">
                                                                Befriend
                                                            </button>
                                                        ) : (
                                                            <span className="text-xs font-bold text-emerald-400 px-2">Friend</span>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}

                                <div className="mt-4 pt-2 border-t border-gray-800">
                                    <button onClick={quitSport} className="w-full bg-red-950/30 text-red-400 border border-red-900/50 hover:bg-red-900 hover:text-white font-bold py-3 rounded-xl transition-all text-sm">Quit Team</button>
                                </div>
                            </div>
                        ) : (
                            <div className="mt-4 pt-4 border-t border-gray-800 text-gray-400 text-sm italic">You are not currently on a sports team.</div>
                        )}

                    {!character.sports.team && (
                        <>
                            <div className="mb-2 mt-6 font-bold text-gray-500 uppercase text-xs tracking-wider px-2">Tryouts</div>
                            
                            {(character.age >= 11 && character.age <= 14) && (
                                <>
                                    <MenuCard icon={<Basketball />} title="Middle School Basketball" desc="Try out for the team" onClick={() => tryOutSport("Basketball", "Middle School")} />
                                    <MenuCard icon={<Baseball />} title="Middle School Baseball" desc="Try out for the team" onClick={() => tryOutSport("Baseball", "Middle School")} />
                                    <MenuCard icon={<SoccerBall />} title="Middle School Soccer" desc="Try out for the team" onClick={() => tryOutSport("Soccer", "Middle School")} />
                                </>
                            )}

                            {(character.age > 14 && character.age <= 18) && (
                                <>
                                    <MenuCard icon={<Basketball />} title="High School Basketball" desc="Try out for the varsity team" onClick={() => tryOutSport("Basketball", "High School")} />
                                    <MenuCard icon={<Baseball />} title="High School Baseball" desc="Try out for the varsity team" onClick={() => tryOutSport("Baseball", "High School")} />
                                    <MenuCard icon={<SoccerBall />} title="High School Soccer" desc="Try out for the varsity team" onClick={() => tryOutSport("Soccer", "High School")} />
                                </>
                            )}

                            {(character.age > 18 && education.current && education.current.includes("University")) && (
                                <>
                                    <MenuCard icon={<Basketball />} title="College Basketball" desc="Try out for the college team" onClick={() => tryOutSport("Basketball", "College")} />
                                    <MenuCard icon={<Baseball />} title="College Baseball" desc="Try out for the college team" onClick={() => tryOutSport("Baseball", "College")} />
                                    <MenuCard icon={<SoccerBall />} title="College Soccer" desc="Try out for the college team" onClick={() => tryOutSport("Soccer", "College")} />
                                </>
                            )}

                            {(character.age >= 18) && (
                                <>
                                    <div className="mb-2 mt-6 font-bold text-yellow-500 uppercase text-xs tracking-wider px-2">Professional Leagues</div>
                                    <MenuCard icon={<Basketball />} title="Pro Basketball League" desc="Declare for the Draft" onClick={() => tryOutSport("Basketball", "Pro")} color="text-yellow-400" bg="bg-yellow-950/20" />
                                    <MenuCard icon={<Baseball />} title="Pro Baseball League" desc="Declare for the Draft" onClick={() => tryOutSport("Baseball", "Pro")} color="text-yellow-400" bg="bg-yellow-950/20" />
                                    <MenuCard icon={<SoccerBall />} title="Pro Soccer League" desc="Declare for the Draft" onClick={() => tryOutSport("Soccer", "Pro")} color="text-yellow-400" bg="bg-yellow-950/20" />
                                </>
                            )}
                        </>
                    )}
                  </ScreenLayout>
                )}

                {activeScreen === 'vacation' && (
                  <ScreenLayout title="Plan Vacation">
                    <div className="bg-gray-900 border border-sky-800/50 rounded-2xl p-5 mb-4 shadow-lg animate-in slide-in-from-bottom-2">
                       <h3 className="text-lg font-bold text-white mb-4">Book a Flight</h3>
                       
                       <label className="block text-xs font-bold uppercase text-gray-400 mb-2">Destination</label>
                       <select value={selectedDest.name} onChange={(e) => setSelectedDest(VACATION_SPOTS.find(v => v.name === e.target.value))} className="w-full bg-gray-950 border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-sky-500 mb-4 appearance-none">
                          {VACATION_SPOTS.map(v => <option key={v.name} value={v.name}>{v.name} (Base: ${v.baseCost})</option>)}
                       </select>

                       <label className="block text-xs font-bold uppercase text-gray-400 mb-2">Cabin Class</label>
                       <select value={selectedClass.name} onChange={(e) => setSelectedClass(FLIGHT_CLASSES.find(c => c.name === e.target.value))} className="w-full bg-gray-950 border border-gray-700 rounded-xl p-3 text-white focus:outline-none focus:border-sky-500 mb-4 appearance-none">
                          {FLIGHT_CLASSES.map(c => <option key={c.name} value={c.name}>{c.name} ({c.multiplier}x cost)</option>)}
                       </select>

                       <label className="block text-xs font-bold uppercase text-gray-400 mb-2">Travel Companions</label>
                       <div className="bg-gray-950 border border-gray-700 rounded-xl p-3 mb-5 max-h-32 overflow-y-auto custom-scrollbar space-y-2">
                           {relationships.filter(r => ['Partner', 'Fiancé(e)', 'Spouse', 'Son', 'Daughter', 'Mother', 'Father', 'Brother', 'Sister', 'Friend'].includes(r.type)).length === 0 ? (
                               <div className="text-gray-500 italic text-xs">No eligible companions to invite.</div>
                           ) : (
                               relationships.filter(r => ['Partner', 'Fiancé(e)', 'Spouse', 'Son', 'Daughter', 'Mother', 'Father', 'Brother', 'Sister', 'Friend'].includes(r.type)).map(r => (
                                   <label key={r.id} className="flex items-center space-x-3 text-sm text-gray-300">
                                       <input type="checkbox"
                                              checked={vacationCompanions.includes(r.id)}
                                              onChange={(e) => {
                                                  if (e.target.checked) setVacationCompanions([...vacationCompanions, r.id]);
                                                  else setVacationCompanions(vacationCompanions.filter(id => id !== r.id));
                                              }}
                                              className="form-checkbox h-4 w-4 text-sky-500 rounded bg-gray-900 border-gray-700" />
                                       <span>{r.name} ({r.type})</span>
                                   </label>
                               ))
                           )}
                       </div>
                       
                       <div className="text-sky-400 font-bold text-2xl mb-5 text-center bg-gray-950 p-3 rounded-xl border border-gray-800">
                          Total: ${(selectedDest.baseCost * selectedClass.multiplier * (1 + vacationCompanions.length)).toLocaleString()}
                       </div>
                       
                       <div className="flex gap-2">
                          <button onClick={bookVacation} className="flex-1 bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 rounded-xl transition-all flex justify-center items-center gap-2 shadow-lg shadow-sky-900/20"><Plane size={18}/> Book Trip</button>
                          <button onClick={() => { setActiveScreen('activities'); setVacationCompanions([]); }} className="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-xl transition-all border border-gray-700">Cancel</button>
                       </div>
                    </div>
                  </ScreenLayout>
                )}

                {activeScreen === 'jobs' && (
                  <ScreenLayout title="Careers & Part-Time">
